<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Metrom | GPS Recorder</title>
	<style>
		:root {
			--bg: #0f2f2a;
			--panel: #1d4b42;
			--panel-2: #143a34;
			--text: #e8f4f1;
			--muted: #b7d1cb;
			--accent: #ffcf86;
			--ok: #78d4a6;
			--warn: #ffd57a;
			--danger: #ff8f8f;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Segoe UI", Tahoma, Verdana, sans-serif;
			background: radial-gradient(circle at 20% 0%, #245f52 0%, var(--bg) 52%);
			color: var(--text);
		}

		.page {
			max-width: 1100px;
			margin: 0 auto;
			padding: 24px 16px 40px;
		}

		h1 {
			margin: 0 0 8px;
			color: var(--accent);
			font-size: clamp(1.6rem, 2.2vw, 2.2rem);
		}

		.subtitle {
			margin: 0 0 18px;
			color: var(--muted);
		}

		.panel {
			background: linear-gradient(170deg, var(--panel) 0%, var(--panel-2) 100%);
			border: 1px solid rgba(255, 207, 134, 0.25);
			border-radius: 12px;
			padding: 14px;
			margin-bottom: 14px;
		}

		.controls {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
			gap: 12px;
			align-items: end;
		}

		label {
			display: block;
			font-size: 0.92rem;
			font-weight: 600;
			color: var(--muted);
			margin-bottom: 6px;
		}

		input, select {
			width: 100%;
			border-radius: 8px;
			border: 1px solid rgba(255, 207, 134, 0.35);
			background: rgba(0, 0, 0, 0.2);
			color: var(--text);
			padding: 10px 11px;
			font-size: 0.94rem;
		}

		.buttons {
			display: grid;
			grid-template-columns: 1fr;
			gap: 10px;
			margin-top: 14px;
		}

		.button-group {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
			align-items: center;
		}

		.group-title {
			font-size: 0.82rem;
			font-weight: 700;
			letter-spacing: 0.03em;
			color: var(--muted);
			text-transform: uppercase;
			margin-right: 2px;
		}

		button {
			border: 1px solid rgba(255, 207, 134, 0.4);
			border-radius: 999px;
			background: rgba(255, 207, 134, 0.15);
			color: var(--accent);
			font-weight: 700;
			padding: 9px 14px;
			cursor: pointer;
			transition: transform 0.15s ease, background 0.2s ease;
		}

		button:hover:not(:disabled) {
			transform: translateY(-1px);
			background: rgba(255, 207, 134, 0.24);
		}

		button:disabled {
			opacity: 0.5;
			cursor: not-allowed;
		}

		.status {
			margin-top: 2px;
			padding: 9px 10px;
			border-radius: 8px;
			background: rgba(0, 0, 0, 0.18);
			color: var(--muted);
			font-weight: 600;
		}

		.status.ok { color: var(--ok); }
		.status.warn { color: var(--warn); }
		.status.danger { color: var(--danger); }

		.stats {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
			gap: 10px;
		}

		.stat {
			background: rgba(0, 0, 0, 0.2);
			border: 1px solid rgba(255, 255, 255, 0.06);
			border-radius: 10px;
			padding: 11px 12px;
			min-height: 76px;
		}

		.stat .k {
			color: var(--muted);
			font-size: 0.78rem;
			text-transform: uppercase;
			letter-spacing: 0.04em;
			margin-bottom: 6px;
		}

		.stat .v {
			font-size: 1.14rem;
			font-weight: 700;
		}


		@media (max-width: 760px) {
			.page {
				padding: 18px 12px 30px;
			}

			.panel {
				padding: 12px;
			}

			button {
				flex: 1 1 calc(50% - 8px);
				text-align: center;
			}

			
		}
	</style>
</head>
<body>
	<main class="page">
		<h1>GPS Recorder</h1>
		<p class="subtitle">Record a full metro trip once, export it, then reuse it later for testing without traveling again.</p>

		<section class="panel">
			<div class="controls">
				<div>
					<label for="sessionName">Session Name</label>
					<input id="sessionName" type="text" placeholder="e.g. line2-cairo-university-to-sadat">
				</div>
				<div>
					<label><input id="recordAllPoints" type="checkbox"> Record all points (test noise)</label>
				</div>
				<div>
					<label for="minDistance">Min distance between saved points (meters)</label>
					<input id="minDistance" type="number" min="0" value="0">
				</div>
				<div>
					<label for="maxAge">GPS maximum age (ms)</label>
					<input id="maxAge" type="number" min="0" value="0">
				</div>
				<div>
					<label for="timeout">GPS timeout (ms)</label>
					<input id="timeout" type="number" min="1000" value="20000">
				</div>
			</div>

			<div class="buttons">
				<div class="button-group">
					<span class="group-title">Recorder</span>
					<button id="startBtn">Start Recording</button>
					<button id="pauseBtn" disabled>Pause</button>
					<button id="stopBtn" disabled>Stop</button>
					<button id="clearBtn">Clear</button>
				</div>
				<div class="button-group">
					<span class="group-title">Export</span>
					<button id="jsonBtn" disabled>Download JSON</button>
					<button id="csvBtn" disabled>Download CSV</button>
					<button id="geoBtn" disabled>Download GeoJSON</button>
				</div>
			</div>

			<div id="status" class="status">Ready. Click Start Recording.</div>
		</section>

		<section class="panel">
			<div class="stats">
				<div class="stat"><div class="k">State</div><div class="v" id="stState">Idle</div></div>
				<div class="stat"><div class="k">Recorded Points</div><div class="v" id="stPoints">0</div></div>
				<div class="stat"><div class="k">Duration</div><div class="v" id="stDuration">00:00</div></div>
				<div class="stat"><div class="k">Distance</div><div class="v" id="stDistance">0.00 km</div></div>
				<div class="stat"><div class="k">Last Speed</div><div class="v" id="stSpeed">0.0 km/h</div></div>
				<div class="stat"><div class="k">Last Accuracy</div><div class="v" id="stAccuracy">-- m</div></div>
			</div>
		</section>

		
	</main>

	<script>
		(function() {
			var state = {
				mode: 'idle',
				watchId: null,
				startedAt: null,
				pausedAt: null,
				pausedTotalMs: 0,
				totalDistanceKm: 0,
				points: [],
				lastAccepted: null,
				minDistanceMeters: 0,
				recordAllPoints: false
			};

			var els = {
				sessionName: document.getElementById('sessionName'),
				minDistance: document.getElementById('minDistance'),
				recordAllPoints: document.getElementById('recordAllPoints'),
				maxAge: document.getElementById('maxAge'),
				timeout: document.getElementById('timeout'),
				startBtn: document.getElementById('startBtn'),
				pauseBtn: document.getElementById('pauseBtn'),
				stopBtn: document.getElementById('stopBtn'),
				clearBtn: document.getElementById('clearBtn'),
				jsonBtn: document.getElementById('jsonBtn'),
				csvBtn: document.getElementById('csvBtn'),
				geoBtn: document.getElementById('geoBtn'),
				status: document.getElementById('status'),
				stState: document.getElementById('stState'),
				stPoints: document.getElementById('stPoints'),
				stDuration: document.getElementById('stDuration'),
				stDistance: document.getElementById('stDistance'),
				stSpeed: document.getElementById('stSpeed'),
				stAccuracy: document.getElementById('stAccuracy')
			};

			function haversineKm(lat1, lng1, lat2, lng2) {
				var R = 6371;
				var dLat = (lat2 - lat1) * Math.PI / 180;
				var dLng = (lng2 - lng1) * Math.PI / 180;
				var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
					Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
					Math.sin(dLng / 2) * Math.sin(dLng / 2);
				return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
			}

			function formatDuration(ms) {
				var s = Math.max(0, Math.floor(ms / 1000));
				var m = Math.floor(s / 60);
				var rem = s % 60;
				return String(m).padStart(2, '0') + ':' + String(rem).padStart(2, '0');
			}

			function setStatus(msg, cls) {
				els.status.className = 'status' + (cls ? (' ' + cls) : '');
				els.status.textContent = msg;
			}

			function updateStats() {
				var now = Date.now();
				var liveDurationMs = 0;
				if (state.startedAt) {
					var end = state.mode === 'paused' ? state.pausedAt : now;
					liveDurationMs = Math.max(0, end - state.startedAt - state.pausedTotalMs);
				}

				var last = state.points.length ? state.points[state.points.length - 1] : null;

				els.stState.textContent = state.mode.charAt(0).toUpperCase() + state.mode.slice(1);
				els.stPoints.textContent = String(state.points.length);
				els.stDuration.textContent = formatDuration(liveDurationMs);
				els.stDistance.textContent = state.totalDistanceKm.toFixed(2) + ' km';
				els.stSpeed.textContent = (last ? last.speedKmh.toFixed(1) : '0.0') + ' km/h';
				els.stAccuracy.textContent = last && Number.isFinite(last.accuracy) ? last.accuracy.toFixed(0) + ' m' : '-- m';

				var hasData = state.points.length > 0;
				els.jsonBtn.disabled = !hasData;
				els.csvBtn.disabled = !hasData;
				els.geoBtn.disabled = !hasData;
			}

			

			function clearWatch() {
				if (state.watchId !== null) {
					navigator.geolocation.clearWatch(state.watchId);
					state.watchId = null;
				}
			}

			function startWatch() {
				if (!navigator.geolocation) {
					setStatus('Geolocation is not supported in this browser.', 'danger');
					return;
				}

				clearWatch();
				state.watchId = navigator.geolocation.watchPosition(function(pos) {
					if (state.mode !== 'recording') return;

					var p = {
						idx: state.points.length + 1,
						timestamp: pos.timestamp || Date.now(),
						lat: Number(pos.coords.latitude),
						lng: Number(pos.coords.longitude),
						accuracy: Number(pos.coords.accuracy),
						altitude: Number(pos.coords.altitude),
						altitudeAccuracy: Number(pos.coords.altitudeAccuracy),
						heading: Number(pos.coords.heading),
						speedMs: Number(pos.coords.speed),
						speedKmh: Number.isFinite(pos.coords.speed) ? (pos.coords.speed * 3.6) : 0,
						source: 'gps'
					};

					if (state.lastAccepted && !state.recordAllPoints) {
						var jumpKm = haversineKm(state.lastAccepted.lat, state.lastAccepted.lng, p.lat, p.lng);
						if ((jumpKm * 1000) < state.minDistanceMeters) {
							updateStats();
							return;
						}
						state.totalDistanceKm += jumpKm;
					} else if (state.lastAccepted && state.recordAllPoints) {
						var jumpKm = haversineKm(state.lastAccepted.lat, state.lastAccepted.lng, p.lat, p.lng);
						state.totalDistanceKm += jumpKm;
					}

					state.points.push(p);
					state.lastAccepted = p;
					setStatus('Recording... captured point #' + p.idx + ' (accuracy ±' + p.accuracy.toFixed(0) + ' m).', 'ok');
					updateStats();
				}, function(err) {
					setStatus('GPS error: ' + err.message, 'danger');
				}, {
					enableHighAccuracy: true,
					maximumAge: Math.max(0, parseInt(els.maxAge.value, 10) || 1000),
					timeout: Math.max(1000, parseInt(els.timeout.value, 10) || 20000)
				});
			}

			function startRecording() {
				if (state.mode === 'recording') return;

				state.minDistanceMeters = Math.max(0, parseFloat(els.minDistance.value) || 0);
				state.recordAllPoints = els.recordAllPoints.checked;

				if (state.mode === 'paused') {
					state.pausedTotalMs += Date.now() - state.pausedAt;
					state.pausedAt = null;
				} else {
					state.startedAt = Date.now();
				}

				state.mode = 'recording';
				els.startBtn.disabled = true;
				els.pauseBtn.disabled = false;
				els.stopBtn.disabled = false;
				startWatch();
				setStatus('Recording started. Move normally to capture points.', 'ok');
				updateStats();
			}

			function pauseRecording() {
				if (state.mode !== 'recording') return;
				state.mode = 'paused';
				state.pausedAt = Date.now();
				clearWatch();
				els.startBtn.disabled = false;
				els.pauseBtn.disabled = true;
				setStatus('Recording paused.', 'warn');
				updateStats();
			}

			function stopRecording() {
				if (state.mode !== 'recording' && state.mode !== 'paused') return;

				if (state.mode === 'paused' && state.pausedAt) {
					state.pausedTotalMs += Date.now() - state.pausedAt;
				}

				state.mode = 'stopped';
				clearWatch();
				els.startBtn.disabled = false;
				els.pauseBtn.disabled = true;
				els.stopBtn.disabled = true;
				setStatus('Recording stopped. You can now download the file(s).', 'ok');
				updateStats();
			}

			function clearAll() {
				clearWatch();
				state.mode = 'idle';
				state.startedAt = null;
				state.pausedAt = null;
				state.pausedTotalMs = 0;
				state.totalDistanceKm = 0;
				state.points = [];
				state.lastAccepted = null;
				
				els.startBtn.disabled = false;
				els.pauseBtn.disabled = true;
				els.stopBtn.disabled = true;
				setStatus('Cleared. Ready for a new trip recording.', 'warn');
				updateStats();
			}

			function sessionPayload() {
				var nowIso = new Date().toISOString();
				var name = (els.sessionName.value || '').trim() || ('trip-' + nowIso.replace(/[:.]/g, '-'));
				var endMs = state.mode === 'recording' ? Date.now() : (state.pausedAt || Date.now());
				var durationMs = state.startedAt ? Math.max(0, endMs - state.startedAt - state.pausedTotalMs) : 0;

				return {
					version: 1,
					app: 'Metrom GPS Recorder',
					sessionName: name,
					createdAt: nowIso,
					summary: {
						points: state.points.length,
						durationMs: durationMs,
						durationText: formatDuration(durationMs),
						distanceKm: Number(state.totalDistanceKm.toFixed(4)),
						minDistanceMeters: state.minDistanceMeters
					},
					settings: {
						maximumAgeMs: Math.max(0, parseInt(els.maxAge.value, 10) || 1000),
						timeoutMs: Math.max(1000, parseInt(els.timeout.value, 10) || 20000),
						highAccuracy: true
					},
					points: state.points
				};
			}

			function download(name, content, type) {
				var blob = new Blob([content], { type: type });
				var url = URL.createObjectURL(blob);
				var a = document.createElement('a');
				a.href = url;
				a.download = name;
				document.body.appendChild(a);
				a.click();
				document.body.removeChild(a);
				URL.revokeObjectURL(url);
			}

			function downloadJson() {
				var data = sessionPayload();
				download(data.sessionName + '.json', JSON.stringify(data, null, 2), 'application/json;charset=utf-8');
			}

			function downloadCsv() {
				var data = sessionPayload();
				var header = 'idx,timestamp_iso,lat,lng,accuracy_m,altitude_m,altitude_accuracy_m,heading_deg,speed_ms,speed_kmh,source';
				var rows = data.points.map(function(p) {
					return [
						p.idx,
						new Date(p.timestamp).toISOString(),
						p.lat,
						p.lng,
						Number.isFinite(p.accuracy) ? p.accuracy : '',
						Number.isFinite(p.altitude) ? p.altitude : '',
						Number.isFinite(p.altitudeAccuracy) ? p.altitudeAccuracy : '',
						Number.isFinite(p.heading) ? p.heading : '',
						Number.isFinite(p.speedMs) ? p.speedMs : '',
						Number.isFinite(p.speedKmh) ? p.speedKmh : '',
						p.source
					].join(',');
				});
				download(data.sessionName + '.csv', [header].concat(rows).join('\n'), 'text/csv;charset=utf-8');
			}

			function downloadGeoJson() {
				var data = sessionPayload();
				var features = data.points.map(function(p) {
					return {
						type: 'Feature',
						properties: {
							idx: p.idx,
							timestamp: p.timestamp,
							accuracy_m: p.accuracy,
							speed_kmh: p.speedKmh,
							heading_deg: p.heading,
							source: p.source
						},
						geometry: {
							type: 'Point',
							coordinates: [p.lng, p.lat]
						}
					};
				});

				var lineCoords = data.points.map(function(p) { return [p.lng, p.lat]; });
				if (lineCoords.length > 1) {
					features.unshift({
						type: 'Feature',
						properties: {
							kind: 'track_line',
							sessionName: data.sessionName
						},
						geometry: {
							type: 'LineString',
							coordinates: lineCoords
						}
					});
				}

				var geo = {
					type: 'FeatureCollection',
					name: data.sessionName,
					features: features
				};

				download(data.sessionName + '.geojson', JSON.stringify(geo, null, 2), 'application/geo+json;charset=utf-8');
			}

			els.startBtn.addEventListener('click', startRecording);
			els.pauseBtn.addEventListener('click', pauseRecording);
			els.stopBtn.addEventListener('click', stopRecording);
			els.clearBtn.addEventListener('click', clearAll);
			els.jsonBtn.addEventListener('click', downloadJson);
			els.csvBtn.addEventListener('click', downloadCsv);
			els.geoBtn.addEventListener('click', downloadGeoJson);

			setInterval(updateStats, 1000);
			updateStats();
		})();
	</script>
</body>
</html>
